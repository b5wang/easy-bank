# ConfigMap stores the Redis and Sentinel startup scripts used by the development cluster.
# The scripts generate runtime config files under `/data`, where Redis and Sentinel can
# preserve state across Pod restarts.
apiVersion: v1
kind: ConfigMap
metadata:
  name: eb-redis-config
  namespace: easy-bank-dev
data:
  redis-bootstrap.sh: |
    #!/bin/sh
    set -eu

    POD_NAME="${HOSTNAME}"
    CURRENT_FQDN="${POD_NAME}.${REDIS_HEADLESS_SERVICE_NAME}.${K8S_NAMESPACE}.svc.cluster.local"
    SENTINEL_STATE_FILE="/data/sentinel/sentinel.conf"
    REDIS_CONF_DIR="/data/conf"
    REDIS_CONF_FILE="${REDIS_CONF_DIR}/redis.conf"

    # On the first boot, replicas follow `eb-redis-0`. After Sentinel failover,
    # later restarts read the last known master from Sentinel's persisted state.
    detect_master_host() {
      if [ -f "${SENTINEL_STATE_FILE}" ]; then
        host="$(awk -v master_name="${REDIS_MASTER_NAME}" '$1 == "sentinel" && $2 == "monitor" && $3 == master_name {print $4; exit}' "${SENTINEL_STATE_FILE}")"
        if [ -n "${host}" ]; then
          printf '%s\n' "${host}"
          return 0
        fi
      fi

      printf '%s\n' "${REDIS_MASTER_POD_FQDN}"
    }

    MASTER_HOST="$(detect_master_host)"

    mkdir -p "${REDIS_CONF_DIR}" /data/sentinel

    cat > "${REDIS_CONF_FILE}" <<EOF
    bind 0.0.0.0
    protected-mode no
    port ${REDIS_PORT}
    dir /data
    daemonize no
    loglevel notice

    # Password authentication is enabled so replicas and applications must authenticate.
    requirepass ${REDIS_PASSWORD}
    masterauth ${REDIS_PASSWORD}

    # Persistence is enabled because Redis also carries idempotency keys, locks,
    # and short-lived state that should not disappear casually in development.
    appendonly yes
    appendfilename "appendonly.aof"
    appendfsync everysec
    aof-use-rdb-preamble yes
    save 900 1
    save 300 10
    save 60 10000

    # These values intentionally trade "small footprint" and "good enough speed"
    # for development, while refusing to evict important keys unexpectedly.
    maxmemory ${REDIS_MAXMEMORY}
    maxmemory-policy noeviction
    repl-diskless-sync yes
    repl-diskless-sync-delay 1
    tcp-keepalive 60
    timeout 0

    # Sentinel hostname support works better when replicas announce stable DNS names.
    replica-announce-ip ${CURRENT_FQDN}
    replica-announce-port ${REDIS_PORT}
    EOF

    if [ "${CURRENT_FQDN}" != "${MASTER_HOST}" ] && [ "${POD_NAME}" != "${MASTER_HOST}" ]; then
      printf 'replicaof %s %s\n' "${MASTER_HOST}" "${REDIS_PORT}" >> "${REDIS_CONF_FILE}"
    fi

    exec redis-server "${REDIS_CONF_FILE}"

  sentinel-bootstrap.sh: |
    #!/bin/sh
    set -eu

    POD_NAME="${HOSTNAME}"
    CURRENT_FQDN="${POD_NAME}.${REDIS_HEADLESS_SERVICE_NAME}.${K8S_NAMESPACE}.svc.cluster.local"
    SENTINEL_DIR="/data/sentinel"
    SENTINEL_CONF_FILE="${SENTINEL_DIR}/sentinel.conf"

    mkdir -p "${SENTINEL_DIR}"

    # Sentinel rewrites its own config file during failover, so the file must live
    # on writable storage rather than on a read-only ConfigMap mount.
    if [ ! -f "${SENTINEL_CONF_FILE}" ]; then
      cat > "${SENTINEL_CONF_FILE}" <<EOF
      port ${REDIS_SENTINEL_PORT}
      dir ${SENTINEL_DIR}
      protected-mode no
      sentinel resolve-hostnames yes
      sentinel announce-hostnames yes
      sentinel announce-ip ${CURRENT_FQDN}
      sentinel announce-port ${REDIS_SENTINEL_PORT}
      sentinel monitor ${REDIS_MASTER_NAME} ${REDIS_MASTER_POD_FQDN} ${REDIS_PORT} ${REDIS_SENTINEL_QUORUM}
      sentinel auth-pass ${REDIS_MASTER_NAME} ${REDIS_PASSWORD}
      sentinel down-after-milliseconds ${REDIS_MASTER_NAME} ${REDIS_SENTINEL_DOWN_AFTER_MS}
      sentinel failover-timeout ${REDIS_MASTER_NAME} ${REDIS_SENTINEL_FAILOVER_TIMEOUT_MS}
      sentinel parallel-syncs ${REDIS_MASTER_NAME} ${REDIS_SENTINEL_PARALLEL_SYNCS}
      EOF
    fi

    exec redis-server "${SENTINEL_CONF_FILE}" --sentinel
