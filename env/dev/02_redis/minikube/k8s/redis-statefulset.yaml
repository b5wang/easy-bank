# StatefulSet keeps stable Pod identities, which Redis replication and Sentinel
# use through DNS names such as `eb-redis-0.eb-redis-headless...`.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: eb-redis
  namespace: easy-bank-dev
spec:
  serviceName: eb-redis-headless
  replicas: 3
  selector:
    matchLabels:
      app: eb-redis
  template:
    metadata:
      labels:
        app: eb-redis
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: redis
          image: redis:8.6.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - /opt/redis/config-src/redis-bootstrap.sh
          env:
            - name: K8S_NAMESPACE
              value: easy-bank-dev
            - name: REDIS_HEADLESS_SERVICE_NAME
              value: eb-redis-headless
            - name: REDIS_MASTER_NAME
              value: ebmaster
            - name: REDIS_MASTER_POD_FQDN
              value: eb-redis-0.eb-redis-headless.easy-bank-dev.svc.cluster.local
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_MAXMEMORY
              value: 256mb
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: eb-redis-secret
                  key: redis-password
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" --no-auth-warning ping | grep PONG
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" --no-auth-warning ping | grep PONG
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: redis-config
              mountPath: /opt/redis/config-src
              readOnly: true
            - name: redis-data
              # `/data` keeps both Redis persistence files and the writable Sentinel state file.
              mountPath: /data
        - name: sentinel
          image: redis:8.6.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - /opt/redis/config-src/sentinel-bootstrap.sh
          env:
            - name: K8S_NAMESPACE
              value: easy-bank-dev
            - name: REDIS_HEADLESS_SERVICE_NAME
              value: eb-redis-headless
            - name: REDIS_MASTER_NAME
              value: ebmaster
            - name: REDIS_MASTER_POD_FQDN
              value: eb-redis-0.eb-redis-headless.easy-bank-dev.svc.cluster.local
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_SENTINEL_PORT
              value: "26379"
            - name: REDIS_SENTINEL_QUORUM
              value: "2"
            - name: REDIS_SENTINEL_DOWN_AFTER_MS
              value: "10000"
            - name: REDIS_SENTINEL_FAILOVER_TIMEOUT_MS
              value: "60000"
            - name: REDIS_SENTINEL_PARALLEL_SYNCS
              value: "1"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: eb-redis-secret
                  key: redis-password
          ports:
            - name: sentinel
              containerPort: 26379
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -p 26379 ping | grep PONG
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -p 26379 ping | grep PONG
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: redis-config
              mountPath: /opt/redis/config-src
              readOnly: true
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-config
          configMap:
            name: eb-redis-config
            # ConfigMap scripts must be executable inside the containers.
            defaultMode: 493
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
        storageClassName: standard
