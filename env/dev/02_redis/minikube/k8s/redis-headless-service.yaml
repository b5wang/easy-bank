# Headless Service provides stable DNS names for StatefulSet Pods.
apiVersion: v1
kind: Service
metadata:
  name: eb-redis-headless
  namespace: easy-bank-dev
spec:
  clusterIP: None
  # Redis replicas and Sentinel need stable Pod DNS names before the Pods become Ready,
  # otherwise bootstrap and failover discovery can fail during startup.
  publishNotReadyAddresses: true
  selector:
    app: eb-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
