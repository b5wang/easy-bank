# Deployment manages the MySQL Pod lifecycle in the development cluster.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eb-mysql
  namespace: easy-bank-dev
spec:
  # One MySQL instance is enough for local development.
  replicas: 1
  strategy:
    # Recreate avoids two MySQL Pods competing for the same data directory.
    type: Recreate
  selector:
    matchLabels:
      app: eb-mysql
  template:
    metadata:
      labels:
        app: eb-mysql
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: mysql
          image: mysql:8.4.8
          imagePullPolicy: IfNotPresent
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: eb-mysql-secret
                  key: mysql-root-password
            - name: TZ
              value: Asia/Singapore
          ports:
            - name: mysql
              containerPort: 3306
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -uroot -p"$MYSQL_ROOT_PASSWORD" --silent
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -uroot -p"$MYSQL_ROOT_PASSWORD" --silent
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: mysql-config
              # `/etc/my.cnf` includes `/etc/mysql/conf.d/`, so mounting one file here extends MySQL config cleanly.
              mountPath: /etc/mysql/conf.d/90-easy-bank-dev.cnf
              subPath: 90-easy-bank-dev.cnf
              readOnly: true
            - name: mysql-data
              # MySQL stores table files and redo logs under /var/lib/mysql.
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-config
          configMap:
            name: eb-mysql-config
        - name: mysql-data
          persistentVolumeClaim:
            claimName: eb-mysql-data
