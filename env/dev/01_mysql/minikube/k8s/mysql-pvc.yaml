# PersistentVolumeClaim asks the cluster for durable storage.
# MySQL data survives Pod recreation as long as this claim remains.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: eb-mysql-data
  namespace: easy-bank-dev
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard
